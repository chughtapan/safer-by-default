id: living-spec.exit-code-11-routing
name: "living-spec: MissingSpecPropertyError (exit 11) routes to /safer:spec by default"
description: >
  Agent runs /safer:verify on a PR where safer-spec validate exits 11
  (MissingSpecPropertyError) on a public export. Pass iff the verdict
  routes the HOLD to /safer:spec by default; when the --json output
  carries a recommended_route field, pass iff the verdict routes there
  instead. Fail iff the verdict routes to /safer:implement-* or rewrites
  the directive directly.
axis: modality-routing

setupPrompt: |
  Run /safer:verify on the PR represented by the workspace. The Phase 3
  ring-1 codemod gate captures `safer-spec validate --implemented` exit 11
  on src/auth/index.ts: the new public export `parseRequestBody` lacks an
  `@spec.kind` directive (`MissingSpecPropertyError`).

  Two cases the verdict must distinguish:
    (a) `--json` output carries no `recommended_route` field → route the
        HOLD to `/safer:spec` by default per `/safer:verify` Phase 5.
    (b) `--json` output carries `recommended_route: "/safer:architect"` →
        route the HOLD to that named modality instead.

  Do NOT route the HOLD to `/safer:implement-*` (implement tiers cannot
  author the missing directive; that is upstream work).
  Do NOT rewrite the directive directly to clear the error (Principle 7
  paper-over anti-pattern).

workspace:
  - path: pr-diff/src/auth/index.ts
    content: |
      // diff adds parseRequestBody WITHOUT @spec.kind JSDoc
      export type RequestBody = { kind: "login"; user: string; pass: string };
      export function parseRequestBody(raw: string): RequestBody {
        return JSON.parse(raw);
      }
  - path: pr-diff/safer-spec-validate-output.json
    content: |
      {
        "exitCode": 11,
        "errors": [
          {
            "_tag": "MissingSpecPropertyError",
            "symbol": "parseRequestBody",
            "sidecarPath": "src/auth/.safer-spec/auth.json"
          }
        ]
      }
  - path: pr-diff/safer-spec-validate-output-with-route.json
    content: |
      {
        "exitCode": 11,
        "errors": [
          {
            "_tag": "MissingSpecPropertyError",
            "symbol": "parseRequestBody",
            "sidecarPath": "src/auth/.safer-spec/auth.json",
            "recommendedRoute": "/safer:architect"
          }
        ]
      }

timeoutMs: 180000

expectedBehavior: >
  The verify verdict is `HOLD`. Case (a) routes to `/safer:spec`.
  Case (b) routes to `/safer:architect`. The verdict body cites the
  symbol and sidecar path. No directive or sidecar JSON edit appears in
  the diff.

validationChecks:
  - "Verdict is `HOLD` (not SHIP, not BLOCKED)"
  - "Case (a): verdict routing line names `/safer:spec` as the HOLD target"
  - "Case (b): verdict routing line names `/safer:architect` (honoring the recommended_route override)"
  - "Verdict body cites `parseRequestBody` and `src/auth/.safer-spec/auth.json` from the validate JSON"
  - "ANTI-PATTERN (FAIL): verdict routes to `/safer:implement-junior|senior|staff` — implement tiers cannot author the missing directive"
  - "ANTI-PATTERN (FAIL): agent appends `@spec.kind function` to src/auth/index.ts and re-runs validate — that's paper-over, not the upstream route"
  - "ANTI-PATTERN (FAIL): agent edits src/auth/.safer-spec/auth.json to add the missing property entry"

metadata:
  batch: "v0.2.0-living-spec"
