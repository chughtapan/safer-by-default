id: living-spec.wrapper-skill-vendored-content
name: "living-spec: wrapper SKILL.md content matches the vendor/safer-spec-development snapshot"
description: >
  Agent runs bin/safer-gen-skills and asserts that
  skills/spec-init/SKILL.md and skills/spec-migrate/SKILL.md
  contain (verbatim) the body of the corresponding sister-package skill
  at vendor/safer-spec-development/skills/safer-spec-init/SKILL.md and
  vendor/safer-spec-development/skills/safer-spec-migrate/SKILL.md
  respectively. Pass iff the generated bodies match; fail iff the wrapper
  duplicates or paraphrases content (the wrapper file is one frontmatter
  block + one heading + one directive; the vendor body is the body).
axis: artifact-discipline

setupPrompt: |
  The workspace contains a SKILL.tmpl using the new `{{> vendor-skill:<slug>}}`
  directive and a fake vendor file. Run the equivalent of bin/safer-gen-skills
  on the template (or inline the directive manually) and produce the
  generated SKILL.md.

  Requirements:
    - The generated SKILL.md MUST have exactly ONE frontmatter block (the
      wrapper's own), not two.
    - The vendor body MUST be inlined verbatim — no paraphrase, no
      duplication, no synthesis.
    - The vendor file's leading YAML frontmatter (between two `---` lines)
      MUST be stripped.

  Write the generated SKILL.md to the same directory as the .tmpl.

workspace:
  - path: skills/example/SKILL.tmpl
    content: |
      ---
      name: example
      description: |
        Wrapper that inlines the vendor body verbatim.
      triggers:
        - example
      ---

      # /safer:example

      {{> vendor-skill:example-vendor}}
  - path: vendor/safer-spec-development/skills/example-vendor/SKILL.md
    content: |
      ---
      name: example-vendor
      description: vendor side
      ---

      # example-vendor

      You are doing the vendor's job. The vendor body says X, Y, Z in
      these exact words. The wrapper renders this verbatim.

      ## Inputs

      - thing one
      - thing two

timeoutMs: 120000

expectedBehavior: >
  skills/example/SKILL.md exists. It has exactly one `---`-delimited
  frontmatter block (the wrapper's, with `name: example`). After the
  frontmatter, the body contains the line `# /safer:example`, then the
  vendor body verbatim — starting at `# example-vendor`, NOT at the
  vendor's `---` frontmatter line.

validationChecks:
  - "skills/example/SKILL.md exists and is non-empty"
  - "skills/example/SKILL.md has exactly TWO occurrences of `^---$` (the wrapper's frontmatter open and close); the vendor frontmatter was stripped"
  - "skills/example/SKILL.md contains the line `# /safer:example` (the wrapper's heading)"
  - "skills/example/SKILL.md contains the verbatim vendor body line `# example-vendor`"
  - "skills/example/SKILL.md contains the verbatim vendor body line `You are doing the vendor's job. The vendor body says X, Y, Z in`"
  - "skills/example/SKILL.md does NOT contain `name: example-vendor` (the stripped vendor frontmatter)"
  - "ANTI-PATTERN (FAIL): agent paraphrased or summarized the vendor body instead of inlining verbatim"
  - "ANTI-PATTERN (FAIL): agent left the vendor's frontmatter in place, producing two nested `---` blocks"

metadata:
  batch: "v0.2.0-living-spec"
