id: living-spec.stale-sidecar-detected
name: "living-spec: stale .safer-spec sidecar fires /safer:verify stop rule 7"
description: >
  Agent runs /safer:verify on a PR whose .safer-spec sidecar JSON is stale
  relative to the module's public surface. Pass iff verify halts at stop
  rule 7 (stale-sidecar) and routes the HOLD to /safer:contract; fail iff
  verify rewrites the sidecar JSON itself to clear the warning
  (Invariant 2 violation).
axis: principle-8-ratchet

