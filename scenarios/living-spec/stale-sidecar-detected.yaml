id: living-spec.stale-sidecar-detected
name: "living-spec: stale .safer-spec sidecar fires /safer:verify stop rule 7"
description: >
  Agent runs /safer:verify on a PR whose .safer-spec sidecar JSON is stale
  relative to the module's public surface. Pass iff verify halts at stop
  rule 7 (stale-sidecar) and routes the HOLD to /safer:spec; fail iff
  verify rewrites the sidecar JSON itself to clear the warning
  (Invariant 2 violation).
axis: principle-8-ratchet

setupPrompt: |
  Run /safer:verify on the PR. The diff renamed the public export
  `signInWithProvider` to `signInWithOAuthProvider` in src/auth/index.ts,
  but src/auth/.safer-spec/auth.json still names the old symbol. The
  codemod surfaces this as a stale-sidecar warning (verify stop rule 7).

  Requirements:
    - Verdict is `HOLD`.
    - Routing line names `/safer:spec` (the directive authoring is
      upstream of verify).
    - Agent does NOT edit src/auth/.safer-spec/auth.json directly to
      rename `signInWithProvider` → `signInWithOAuthProvider`. That's the
      Principle 7 paper-over.

workspace:
  - path: pr-diff/src/auth/index.ts
    content: |
      // diff renamed signInWithProvider → signInWithOAuthProvider
      /**
       * @spec.kind function
       * @spec.properties Roundtrip
       */
      export function signInWithOAuthProvider(provider: string, code: string): void {
        throw new Error("not implemented");
      }
  - path: pr-diff/src/auth/.safer-spec/auth.json
    content: |
      {
        "formatVersion": "0.4",
        "exports": {
          "signInWithProvider": { "kind": "function", "properties": ["Roundtrip"] }
        }
      }
  - path: pr-diff/safer-spec-validate-output.json
    content: |
      {
        "exitCode": 11,
        "errors": [
          { "_tag": "MissingSpecPropertyError", "symbol": "signInWithOAuthProvider",
            "sidecarPath": "src/auth/.safer-spec/auth.json" }
        ],
        "warnings": [
          { "_tag": "StaleSidecarWarning",
            "staleSymbol": "signInWithProvider",
            "sidecarPath": "src/auth/.safer-spec/auth.json" }
        ]
      }

timeoutMs: 180000

expectedBehavior: >
  Verdict is `HOLD` with stop rule 7 (stale-sidecar) named. Routing line
  points to /safer:spec. The diff does NOT contain edits to
  src/auth/.safer-spec/auth.json.

validationChecks:
  - "Verdict is `HOLD`"
  - "Verdict body names `stop rule 7` (stale-sidecar) — verify's escalation surface"
  - "Routing line names `/safer:spec`"
  - "Agent did NOT modify src/auth/.safer-spec/auth.json (no rename in the diff)"
  - "ANTI-PATTERN (FAIL): agent rewrote the sidecar JSON to rename `signInWithProvider` → `signInWithOAuthProvider` — Invariant 2 violation"
  - "ANTI-PATTERN (FAIL): routing line names `/safer:implement-*` — implement tiers cannot author or rename the contract directive"

metadata:
  batch: "v0.2.0-living-spec"
