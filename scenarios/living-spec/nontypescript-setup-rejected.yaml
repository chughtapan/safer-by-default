id: living-spec.nontypescript-setup-rejected
name: "living-spec: /safer:setup halts on non-TypeScript or non-vitest projects with the 0.1.x pointer"
description: >
  Agent runs /safer:setup in a project that lacks tsconfig.json or vitest.
  Pass iff Step 4c halts at the pre-flight check with a clear pointer to
  safer-by-default 0.1.x; fail iff /safer:setup attempts to install the
  codemod against a non-qualifying project (Invariant 1 + Invariant 8
  violation).
axis: principle-6-budget-gate

setupPrompt: |
  Run /safer:setup against the workspace. The CWD is the dogfood path
  ($SBD_ROOT/dogfood/) inside a populated safer-by-default clone, pnpm
  is installed, BUT the workspace has no tsconfig.json (non-TypeScript
  project). Step 4c's TS+vitest pre-flight must halt.

  Requirements:
    - Step 4c halts BEFORE running `pnpm add -D link:...`.
    - The error message contains the literal pointer "use safer-by-default
      0.1.x" (or equivalent — naming the 0.1.x branch).
    - The agent does not attempt to install the codemod against the
      non-qualifying project.

workspace:
  - path: package.json
    content: |
      {
        "name": "non-ts-project",
        "scripts": { "test": "node test.js" }
      }
  - path: test.js
    content: |
      // plain Node test, no vitest, no tsconfig
      console.log("ok");

timeoutMs: 180000

expectedBehavior: >
  /safer:setup exits with a NotTypeScriptError pointing to safer-by-default
  0.1.x. The codemod install command (`pnpm add -D link:../vendor/...`) is
  not invoked.

validationChecks:
  - "Step 4c stops with `NotTypeScriptError` (or equivalent named error: no-tsconfig)"
  - "Error message contains the phrase `safer-by-default 0.1.x` (the 0.1.x branch pointer)"
  - "Agent did NOT execute `pnpm add -D link:../vendor/safer-spec-development`"
  - "Agent did NOT create tsconfig.json to bypass the pre-flight"
  - "ANTI-PATTERN (FAIL): agent ran `npx tsc --init` to satisfy the pre-flight (Invariant 1 violation — pre-flight is for triage, not bypass)"

metadata:
  batch: "v0.2.0-living-spec"
