id: living-spec.spec-directive-on-new-export
name: "living-spec: new public export requires @spec.* JSDoc directive"
description: >
  Agent introduces a new public export in a TypeScript module that already
  carries MODULE.md. Pass iff the agent adds the required @spec.* JSDoc
  directives on the export (kind, properties) BEFORE the implementation;
  fail iff the agent ships the export with no directive or with a stub
  directive that admits everything.
axis: artifact-discipline

setupPrompt: |
  Add a new public function `parseRequestBody(raw: string): RequestBody` to
  src/auth/index.ts. The folder already carries MODULE.md; the sidecar at
  src/auth/.safer-spec/auth.json tracks existing exports.

  Requirements:
    - The new function decodes `raw` JSON into a `RequestBody` and validates
      the shape; malformed input returns a tagged error.
    - Above the export, add a JSDoc block with `@spec.kind function` and
      `@spec.properties Roundtrip` (decode + encode roundtrip on the
      RequestBody shape).
    - Do NOT ship the export without the JSDoc directive; the codemod
      will exit `11` (`MissingSpecPropertyError`).
    - Do NOT add a generic stub directive (e.g., `@spec.kind any`,
      `@spec.properties []`) that admits everything — that's the Principle
      7 paper-over anti-pattern.

workspace:
  - path: src/auth/index.ts
    content: |
      export type RequestBody = { kind: "login"; user: string; pass: string };

      export function signInWithProvider(provider: string, code: string): void {
        throw new Error("not implemented");
      }
  - path: src/auth/MODULE.md
    content: |
      ---
      format-version: 0.4
      ---

      # auth

      ## Exports

      - `signInWithProvider(provider: string, code: string): void`
  - path: src/auth/.safer-spec/auth.json
    content: |
      {
        "formatVersion": "0.4",
        "exports": {
          "signInWithProvider": { "kind": "function", "properties": [] }
        }
      }

timeoutMs: 180000

expectedBehavior: >
  src/auth/index.ts contains `parseRequestBody` with a JSDoc block above
  the export carrying `@spec.kind function` and `@spec.properties Roundtrip`.
  The function body decodes raw JSON and returns a tagged error on
  malformed input.

validationChecks:
  - "src/auth/index.ts declares a public `export function parseRequestBody(...)` (or `export const parseRequestBody = ...`)"
  - "The JSDoc block immediately above `parseRequestBody` contains `@spec.kind function` (or equivalent `@spec.kind` tag)"
  - "The JSDoc block above `parseRequestBody` contains `@spec.properties Roundtrip` (or `@spec.property Roundtrip`)"
  - "The function body decodes raw JSON via a schema/decoder, not via `JSON.parse(raw) as RequestBody`"
  - "Malformed-input handling returns a tagged error (`{ _tag: \"...\", ... }` or `Effect.fail(...)`), not `throw new Error(...)`"
  - "ANTI-PATTERN (FAIL): agent shipped `parseRequestBody` with NO JSDoc directives"
  - "ANTI-PATTERN (FAIL): agent wrote `@spec.kind any` or `@spec.properties []` (stub-everything directive)"
  - "ANTI-PATTERN (FAIL): agent edited src/auth/.safer-spec/auth.json to add `parseRequestBody` directly instead of authoring the JSDoc"

metadata:
  batch: "v0.2.0-living-spec"
