id: principle-1-types-beat-tests.property-type-as-residual
name: "P1 tests are the residual: a function with a nameable algebraic property gets a PropertyType, not an example test"
description: >
  Agent receives a TypeScript function with a nameable algebraic property
  (roundtrip, idempotence, invariant, or oracle agreement). Pass iff the
  agent fills the @spec.properties JSDoc directive with the corresponding
  PropertyType from the codemod's enum and writes an itSpec.todo placeholder
  for the implementer; fail iff the agent writes a hand-picked-example
  unit test against one input (the example shape is a strictly worse
  compression of the property per PRINCIPLES.md Principle 1 corollary
  "tests are the residual").
axis: principle-1-types-beat-tests

setupPrompt: |
  Open src/encoder.ts. `encode(value)` and `decode(buf)` form a roundtrip
  pair: `decode(encode(x))` equals `x` for every valid `Value`. The folder
  already carries MODULE.md; the codemod's sidecar at
  .safer-spec/encoder.json declares the public surface but the
  PropertyType field is empty.

  Requirements:
    - Add `@spec.properties` JSDoc to the `encode` function naming the
      PropertyType: `Roundtrip` (decode and encode are inverse on the
      value space).
    - Write a single `itSpec.todo("roundtrip: decode is the inverse of encode", { kind: "Roundtrip" })`
      in src/encoder.spec.test.ts that the implementer fills in with a
      `fast-check` property exercising arbitrary `Value` instances.
    - Do NOT write hand-picked-example tests (one `it(...)` with one
      hardcoded input pair) — that is a strictly worse compression of the
      property.
    - Do NOT edit the sidecar JSON directly. The directive is the source;
      the sidecar regenerates.

  Write the final files back to src/encoder.ts and src/encoder.spec.test.ts.

workspace:
  - path: src/encoder.ts
    content: |
      export type Value = { kind: "literal"; payload: string } | { kind: "ref"; id: number };

      export function encode(value: Value): Uint8Array {
        throw new Error("not implemented");
      }

      export function decode(buf: Uint8Array): Value {
        throw new Error("not implemented");
      }
  - path: src/MODULE.md
    content: |
      ---
      format-version: 0.4
      ---

      # encoder

      ## Exports

      - `encode(value: Value): Uint8Array`
      - `decode(buf: Uint8Array): Value`
  - path: src/.safer-spec/encoder.json
    content: |
      {
        "formatVersion": "0.4",
        "exports": {
          "encode": { "kind": "function", "properties": [] },
          "decode": { "kind": "function", "properties": [] }
        }
      }
  - path: src/encoder.spec.test.ts
    content: |
      import { describe } from "vitest";

      describe("encoder", () => {
        // implementer fills this in.
      });

timeoutMs: 180000

expectedBehavior: >
  src/encoder.ts gains a JSDoc block on `encode` (and, ideally, on `decode`)
  carrying `@spec.properties Roundtrip`. src/encoder.spec.test.ts gains a
  single `itSpec.todo` invocation naming the PropertyType. No hand-picked
  examples, no runtime guards, no sidecar JSON edits.

validationChecks:
  - "src/encoder.ts carries `@spec.properties Roundtrip` in the JSDoc above `encode` (or `decode`, or both)"
  - "src/encoder.spec.test.ts contains exactly one `itSpec.todo(..., { kind: \"Roundtrip\" })` invocation"
  - "ANTI-PATTERN (FAIL): agent wrote a hand-picked-example `it(\"encodes literal correctly\", () => expect(decode(encode({kind:\"literal\",payload:\"x\"}))).toEqual(...))` instead of the property"
  - "ANTI-PATTERN (FAIL): agent edited src/.safer-spec/encoder.json directly to set `properties: [\"Roundtrip\"]` — the sidecar regenerates from the JSDoc"
  - "ANTI-PATTERN (FAIL): agent wrote an `it.todo` (vitest's built-in) instead of `itSpec.todo` — the codemod's itSpec form binds to the sidecar's PropertyType enum"

metadata:
  batch: "v0.2.0-living-spec"
