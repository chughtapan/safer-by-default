name: lsp-architecture

on:
  push:
    branches: [main]
    paths:
      - "lsp/**"
      - ".claude-plugin/plugin.json"
      - ".github/workflows/lsp-architecture.yml"
  pull_request:
    paths:
      - "lsp/**"
      - ".claude-plugin/plugin.json"
      - ".github/workflows/lsp-architecture.yml"

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lsp/architecture
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: lsp/architecture/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

  bun-runtime-smoke:
    # Guard against future commits that add a Node-only dep bun can't run.
    # Faster signal than two-lsp-dogfood (which spawns both LSPs end-to-end);
    # this one just confirms bun can parse + resolve the architecture server
    # entry. If this fails, the architecture LSP fails at install time for
    # every plugin consumer.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lsp/architecture
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: lsp/architecture/pnpm-lock.yaml
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"
      - run: pnpm install --frozen-lockfile
      - name: bun resolves architecture server entry
        # --no-output suppresses file writes but still streams to stdout; pipe
        # to /dev/null so the CI log stays clean. We only care about exit code.
        run: bun build server/index.ts --target=bun --no-output >/dev/null

  two-lsp-dogfood:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"
      - name: Install fixture deps
        working-directory: lsp/architecture/dogfood-fixtures/two-lsp
        run: pnpm install --no-frozen-lockfile
      - name: Install architecture LSP deps
        working-directory: lsp/architecture
        run: pnpm install --frozen-lockfile
      - name: Run two-LSP dogfood (bun runs .ts directly; matches plugin.json runtime)
        working-directory: lsp/architecture
        run: bun dogfood.ts
